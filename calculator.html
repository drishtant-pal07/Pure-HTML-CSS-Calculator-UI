<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>

        #content{
            background-color: black;
            width: 200px;
            height: 280px;
            border-radius: 20px;
            align-content: center;
        }

        #display{
            background-color: gainsboro;
            width: 290px;
            height: 40px;
            border-radius: 10px;
            align-items: center;
            text-align: right;
            font-size: 30px;
            font-weight: 900;
        }

        .display{
            font-size: larger;
            width: 70px;
            height: 40px;
            font-weight: 900
            ;
        }
        .Mathbutton{
            font-size: larger;
            width: 70px;
            height: 40px;
            background-color: red;
        }

        #fff{
            font-size: larger;
            width: 70px;
            height: 40px;
            color: blue;
        }



    </style>
</head>
<body>
    <center>
    <div class="content">
        <br><br><br><br><br><br><br><br><br><br><br><br>
        <fieldset id="content">
            <form name="Calculator">
                <input id="display" type="text" name="display" readonly>
                <br><br>
                <input class="Mathbutton" type="button" value="C" onclick="Calculator.display.value =''">
                <input class="Mathbutton" type="button" value="DEL" onclick="Calculator.display.value = Calculator.display.value.toString().slice(0,-1)">
                <input class="display" type="button" value="%" id="fff" onclick="Calculator.display.value +='%'">
                <input class="display" type="button" value="/" id="fff"  onclick="Calculator.display.value +='/'">
                <br>
                <input class="display" type="button" value="7" onclick="Calculator.display.value +='7'">
                <input class="display" type="button" value="8" onclick="Calculator.display.value +='8'">
                <input class="display" type="button" value="9" onclick="Calculator.display.value +='9'">
                <input class="display" type="button" value="*" id="fff" onclick="Calculator.display.value +='*'">
                <br>
                <input class="display" type="button" value="4" onclick="Calculator.display.value +='4'">
                <input class="display" type="button" value="5" onclick="Calculator.display.value +='5'">
                <input class="display" type="button" value="6" onclick="Calculator.display.value +='6'">
                <input class="display" type="button" value="-" id="fff" onclick="Calculator.display.value +='-'">
                <br>
                <input class="display" type="button" value="1" onclick="Calculator.display.value +='1'">
                <input class="display" type="button" value="2" onclick="Calculator.display.value +='2'">
                <input class="display" type="button" value="3" onclick="Calculator.display.value +='3'">
                <input class="display" type="button" value="+" id="fff" onclick="Calculator.display.value +='+'">
                <br>
                <input class="display" type="button" value="00" onclick="Calculator.display.value +='00'">
                <input class="display" type="button" value="0" onclick="Calculator.display.value +='0'">
                <input class="display" type="button" value="." id="fff" onclick="Calculator.display.value +='.'">
                <input class="display" type="button" value="=" id="fff" onclick="Calculator.display.value = eval(Calculator.display.value)">
            </form>
        </fieldset>
    </div>
    </center>
   
</body>
</html>
